<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Padrão Imperial Chocolateria</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root {

    --ouro: #D4AF37;

    --ouro-claro: #F1D36E;

}

body {

    margin: 0;

    font-family: 'Poppins', sans-serif;

    background: radial-gradient(circle, #2c2c2c 0%, #000 100%);

    color: #fff;

    text-align: center;

}

header {

    padding: 60px 20px;

    border-bottom: 1px solid var(--ouro);

}

/* LOGO AJUSTADA */

.logo {

    width: 140px;

    max-width: 40%;

    margin-bottom: 20px;

    border-radius: 50%;

    box-shadow: 0 0 25px rgba(212,175,55,0.4);

    transition: 0.3s;

}

.logo:hover {

    transform: scale(1.05);

}

h1 {

    font-family: 'Playfair Display', serif;

    color: var(--ouro);

}

.btn {

    display: inline-block;

    margin: 10px;

    padding: 14px 25px;

    background: var(--ouro);

    color: black;

    border-radius: 30px;

    text-decoration: none;

    font-weight: bold;

}

.section {

    padding: 40px 20px;

}

.banner-produto img {

    width: 100%;

    border-radius: 15px;

    margin: 20px 0;

}

.card-container {

    display: grid;

    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

    gap: 20px;

}

.produto-card {

    background: rgba(255,255,255,0.05);

    padding: 15px;

    border-radius: 12px;

    cursor: pointer;

    transition: 0.3s;

}

.produto-card:hover {

    transform: translateY(-5px);

    border: 1px solid var(--ouro);

}

.produto-card img {

    width: 100%;

    border-radius: 8px;

}

.preco {

    color: var(--ouro-claro);

}

/* MODAL */

.modal {

    display: none;

    position: fixed;

    width: 100%;

    height: 100%;

    background: rgba(0,0,0,0.9);

}

.modal-content {

    background: #111;

    margin: 10% auto;

    padding: 20px;

    width: 90%;

    max-width: 400px;

    border-radius: 15px;

    border: 1px solid var(--ouro);

}

.modal-content img {

    width: 100%;

    border-radius: 10px;

}

.fechar {

    float: right;

    font-size: 28px;

    cursor: pointer;

}

/* CONTADOR */

.qtd {

    display: flex;

    justify-content: center;

    align-items: center;

    margin: 15px 0;

}

.qtd button {

    background: var(--ouro);

    border: none;

    padding: 10px;

    font-size: 18px;

    cursor: pointer;

}

.qtd span {

    margin: 0 15px;

    font-size: 18px;

}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>PADRÃO IMPERIAL</h1>

<p>✨ Se delicie sem moderação 👑</p>

<a class="btn" href="https://wa.me/5567992648892">Pedir agora</a>

</header>

<!-- DESTAQUES -->

<div class="section">

<h2>Destaques 👑</h2>

<div class="banner-produto">

<img src="brigadeiro.jpg">

</div>

<div class="banner-produto">

<img src="maracuja.jpg">

</div>

<div class="banner-produto">

<img src="beijinho.jpg">

</div>

</div>

<!-- PRODUTOS -->

<div class="section">

<h2>Trufas 🍫</h2>

<div class="card-container">

<div class="produto-card" onclick="abrirModal('brigadeiro.jpg','Trufa de Brigadeiro')">

<img src="brigadeiro.jpg">

Brigadeiro <br><span class="preco">R$6</span>

</div>

<div class="produto-card" onclick="abrirModal('maracuja.jpg','Trufa de Maracujá')">

<img src="maracuja.jpg">

Maracujá <br><span class="preco">R$6</span>

</div>

<div class="produto-card" onclick="abrirModal('beijinho.jpg','Trufa de Beijinho')">

<img src="beijinho.jpg">

Beijinho <br><span class="preco">R$6</span>

</div>

</div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-content">

<span class="fechar" onclick="fecharModal()">&times;</span>

<img id="modal-img">

<h2 id="modal-titulo"></h2>

<div class="qtd">

<button onclick="alterarQtd(-1)">-</button>

<span id="qtd">1</span>

<button onclick="alterarQtd(1)">+</button>

</div>

<a id="btnWhats" class="btn">Pedir no WhatsApp</a>

</div>

</div>

<script>

let quantidade = 1;

let produtoAtual = "";

function abrirModal(img, nome) {

    document.getElementById("modal").style.display = "block";

    document.getElementById("modal-img").src = img;

    document.getElementById("modal-titulo").innerText = nome;

    produtoAtual = nome;

    quantidade = 1;

    document.getElementById("qtd").innerText = quantidade;

}

function fecharModal() {

    document.getElementById("modal").style.display = "none";

}

function alterarQtd(valor) {

    quantidade += valor;

    if (quantidade < 1) quantidade = 1;

    document.getElementById("qtd").innerText = quantidade;

}

document.getElementById("btnWhats").onclick = function() {

    let msg = `Quero pedir ${quantidade}x ${produtoAtual} 👑`;

    window.open("https://wa.me/5567992648892?text=" + encodeURIComponent(msg));
